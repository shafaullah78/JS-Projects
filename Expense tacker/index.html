    <!-- this is the self practice  -->

    <div class="container">

        <h1>Expense Tracker</h1>

        <div class="summary">

            <div class="card balance">
                <h3>Current Balance</h3>
                <h2 id="balance">Rs. 0</h2>
            </div>

            <div class="card income">
                <i class="fa-solid fa-arrow-trend-up"></i>
                <h3>Income</h3>
                <h2 id="income">Rs. 0</h2>

            </div>

            <div class="card expense">
                <i class="fa-solid fa-arrow-trend-down"></i>
                <h3>Expense</h3>
                <h2 id="expense">Rs. 0</h2>

            </div>

        </div>

        <div class="form">

            <h2>Add Transaction</h2>

            <input type="text" placeholder="Title" name="" id="title">

            <input type="number" placeholder="Amount" name="" id="amount">

            <select id="type">

                <option value="">Select Type</option>
                <option>Income</option>
                <option>Expense</option>

            </select>

            <select id="category">

                <option value="">Catagory</option>
                <option>Salary</option>
                <option>Food</option>
                <option>Shopping</option>
                <option>Traval</option>
                <option>Bills</option>
                <option>Others</option>

            </select>

            <button id="addBtn">

                <i class="fa-solid fa-plus"></i>
                Add Transaction
            
            </button>

        </div>

        <div class="search-box">

            <input type="text" placeholder="Search Transaction..." name="" id="search">

            <select id="filter">

                <option>All</option>
                <option>Income</option>
                <option>Expense</option>

            </select>

        </div>

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th>Title</th>
                        <th>Catagory</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="tbody">

                </tbody>

            </table>

        </div>


    </div>

    <script src="app.js"></script>
</body>
