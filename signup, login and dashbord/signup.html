<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h2>Sign Up/Create an account</h2>

            <div>

                <label for="">Name</label>
                <br>
                <input type="text" placeholder="Enter the name" name="" id="s-name">
                <br><br>

                <label for="">Email</label>
                <br>
                <input type="text" placeholder="Enter the email" name="" id="s-email">
                <br><br>

                <label for="">Password</label>
                <br>
                <input type="text" placeholder="Enter the Password" name="" id="s-pass">
                <br><br>

                <button id="signUp">Sign</button>
                <br>

                <p>Do you have already account? <a href="./login.html">Login</a></p>

            </div>


        </div>

    </div>

    <!-- sweet alert  -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="signUp.js"></script>
</body>

</html>
