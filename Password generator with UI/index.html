<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Password generator</h1>

        <div class="password-box">

            <input type="text" name="" placeholder="Generated password" readonly id="password">

            <button id="copyBtn">Copy</button>

        </div>


        <div class="setting">

            <label>Password length</label>

            <input type="number" name="" min="5" max="20" value="10" id="length">

        </div>
        

        <div class="setting">

            <label>

                <input type="checkbox" name="" checked id="upper">
                Uppercase

            </label>

        </div>


        <div class="setting">

            <label>

                <input type="checkbox" name="" checked id="lower">
                Lowercase

            </label>

        </div>


        <div class="setting">

            <label>

                <input type="checkbox" name="" checked id="numbers">
                Numbers

            </label>

        </div>


        <div class="setting">

            <label>

                <input type="checkbox" name="" checked id="symbols">
                Symbols

            </label>

        </div>


        <button id="generateBtn">Generate Password</button>

        


    </div>

    <script src="app.js"></script>
</body>

</html>
