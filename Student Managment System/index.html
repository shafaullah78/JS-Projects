<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    
    <div class="container">

        <div class="card">

            <h1><i class="fa-solid fa-user-graduate"></i>Govt Insaaf High School Kotchandna(Tehsil Esakhel Distt
                Mianwali)</h1>

            <div class="form">

                <input placeholder="Student Name" type="text" name="" id="studentName">
                <input placeholder="Student ID/search by ID" type="number" name="" id="studentID">
                <input placeholder="Student Age" type="number" name="" id="studentAge">
                <input placeholder="Student Marks" type="number" name="" id="studentMarks">

            </div>

            <div class="buttons">

                <button id="addBtn">Add Student</button>
                <button id="searchBtn">Search</button>
                <button id="updateBtn">Update</button>
                <button id="deleteBtn">Delete All</button>
                <button id="recoveryBtn">Recovery del data</button>

            </div>

        </div>


        <div class="table-card">

            <h2>Student Records</h2>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Marks</th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </div>

    </div>


    <!-- sweet alert  -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="app.js"></script>

</body>

</html>
