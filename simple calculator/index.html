<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div style="text-align: center;">

        <h1>Bahi ka calculator</h1>

        <label for="">First Number: </label>

        <input placeholder="Enter first number" type="number" name="" id="number1"><br><br>

        <label for="">Second Number: </label>

        <input placeholder="Enter second number" type="number" name="" id="number2"><br><br>

        <button onclick="add()">+</button>

        <button onclick="sub()">-</button>

        <button onclick="mul()">*</button>

        <button onclick="divid()">/</button>

        <br><br>

        <label for="">Result: </label>

        <input disabled placeholder="Show result" type="text" name="" id="res">

    </div>




    <script src="app.js"></script>
</body>

</html>
