<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main-container {

            background-color: black;

            color: gold;

            border-radius: 20px;

            border: 2px solid black;

            width: 20%;

            margin: 50px auto;

            text-align: center;

        }


        button {

            width: 50px;

            padding: 8px;

            background-color: black;

            color: gold;

            margin: 4px;

            border: 1px groove gold;

            border-radius: 5px;

            font-size: large;

            box-shadow: 0 0 2px gold;

        }


        .big-btn button {

            width: 112px;

            background-color: rgb(181, 8, 8);

            color: white;

        }


        .big-btn button:hover {

            background-color: red;

            color: white;

        }


        .btn-container {

            padding: 10px;

        }


        input {

            font-size: large;

            margin-top: 20px;

            padding: 10px;

            border-radius: 10px;

        }


        .equal button {

            background-color: rgba(255, 68, 0, 0.885);

            color: white;

            width: 234px;

        }


        .equal button:hover {

            background-color: orangered;

            color: white;

        }


        button:hover {

            background-color: gold;

            color: white;

        }
    </style>
</head>

<body>


    <div class="main-container">

        <div class="calculator">

            <input readonly type="text" name="" id="calc">

            <div class="btn-container">

                <div class="big-btn">

                    <button onclick="clrAll()">AC</button>

                    <button onclick="clrOne()">CE</button>

                </div>

                <div>

                    <button onclick="btnClick(9)">9</button>

                    <button onclick="btnClick(8)">8</button>

                    <button onclick="btnClick(7)">7</button>

                    <button onclick="btnClick('/')">/</button>

                </div>

                <div>

                    <button onclick="btnClick(4)">4</button>

                    <button onclick="btnClick(5)">5</button>

                    <button onclick="btnClick(6)">6</button>

                    <button onclick="btnClick('*')">*</button>

                </div>

                <div>

                    <button onclick="btnClick(1)">1</button>

                    <button onclick="btnClick(2)">2</button>

                    <button onclick="btnClick(3)">3</button>

                    <button onclick="btnClick('-')">-</button>

                </div>

                <div>

                    <button onclick="btnClick('.')">.</button>

                    <button onclick="btnClick(0)">0</button>

                    <button onclick="btnClick('00')">00</button>

                    <button onclick="btnClick('+')">+</button>

                </div>

                <div class="equal">

                    <button onclick="equalsTo()">=</button>

                </div>

            </div>

        </div>

    </div>


    <script src="app.js"></script>
</body>

</html>
